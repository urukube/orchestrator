---
name: "orchestrator-destroy"

"on":
  workflow_dispatch:
    inputs:
      component:
        description: "Component to destroy"
        required: true
        type: choice
        options:
          - eks_infra
          - all
      confirm_destroy:
        description: "Type 'destroy' to confirm"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  validate-input:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm_destroy != 'destroy' }}
        run: |
          echo "::error::You must type 'destroy' to confirm the destruction"
          exit 1
      - name: Display destroy target
        run: |
          echo "Component to destroy: ${{ github.event.inputs.component }}"

  orchestrator-destroy:
    needs: validate-input
    uses: "urukube/orchestrator-plane-setup/.github/workflows/destroy.yml@v1"
    with:
      tfvar_file_path: "orchestrator.tfvars"
      bucket_name: "orchestrator-bucket"
      approvers: "dilipsamanta"
      master_s3_directory: "orchestrator"
      component: ${{ github.event.inputs.component }}
      module_ref: "v1"
    secrets: inherit
